name = "checkit-contribute"
main = "index.js"
compatibility_date = "2025-01-01"

# Path B — the user-contribution pipe. Writes a SKUs row to the Airtable
# "SCANSMART I500" base (appCuvm3csLUKo4tx) stamped Source Scope = "User contribution".
#
# After deploying, add the Airtable token as a secret:
#   npx wrangler secret put AIRTABLE_TOKEN
# Paste a Personal Access Token (create at airtable.com/create/tokens) scoped to:
#   - Scope:  data.records:write
#   - Base:   SCANSMART I500 (appCuvm3csLUKo4tx)
# The token is stored encrypted — never in this file or in git.
